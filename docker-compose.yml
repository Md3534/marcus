services:
  db:
    image: postgres:15-alpine
    container_name: mstore-db
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: mstore_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  backend:
    build: ./backend
    container_name: mstore-backend
    volumes:
      - ./backend:/app
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: "always"
    deploy:
      resources:
        limits:
          memory: 512M
    command: python manage.py runserver 0.0.0.0:8000

volumes:
  postgres_data:
